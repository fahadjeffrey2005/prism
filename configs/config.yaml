# PRISM Configuration
# Predictive Reasoning and Intuition System for Mobility

project:
  name: PRISM
  version: "0.2.0"
  description: "Predictive Reasoning and Intuition System for Mobility — camera + LiDAR fusion"

# ── Data ──────────────────────────────────────────────────────────────────────
data:
  root: "~/prism_data"                      # symlink to T7 drive
  nuscenes_root: "~/prism_data/datasets/nuscenes"
  nuscenes_version: "v1.0-mini"
  output_dir: "~/prism_data/experiments"

# ── Sensory Core ──────────────────────────────────────────────────────────────
sensory_core:
  detection:
    model: "yolov8n.pt"                     # nano — fast, Jetson friendly
    confidence_threshold: 0.35
    iou_threshold: 0.45
    device: "cuda"                          # cuda on Jetson | "mps" on M4 | "cpu" fallback
    img_size: 640
    classes_of_interest:                    # COCO classes relevant to driving
      - 0   # person
      - 1   # bicycle
      - 2   # car
      - 3   # motorcycle
      - 5   # bus
      - 7   # truck
      - 9   # traffic light
      - 11  # stop sign

  depth:
    model: "depth-anything-v2-small"        # small — edge deployable
    device: "cuda"
    run_every_n_frames: 3                   # run at ~10fps when camera is 30fps
    encoder: "vits"                         # vits | vitb | vitl

  segmentation:
    model: "fastsam-s.pt"                   # FastSAM small
    device: "mps"
    run_every_n_frames: 3
    confidence_threshold: 0.4

  optical_flow:
    method: "farneback"                     # cpu-friendly dense optical flow
    run_every_n_frames: 1                   # every frame — lightweight

  sampling:
    camera_fps: 12                          # nuScenes is 12fps; USB cam ~10fps
    detection_fps: 12
    depth_fps: 4
    segmentation_fps: 4
    flow_fps: 12

# ── World Model ───────────────────────────────────────────────────────────────
world_model:
  bev:
    x_range: [-50, 50]                      # meters ahead/behind ego
    y_range: [-50, 50]                      # meters left/right of ego
    z_range: [-3, 5]                        # meters up/down
    resolution: 0.5                         # meters per cell
    grid_size: [200, 200]                   # derived from range/resolution

  actor_tracker:
    max_age: 10                             # frames before track is dropped
    min_hits: 2                             # frames before track is confirmed
    iou_threshold: 0.3

# ── Cameras (nuScenes) ────────────────────────────────────────────────────────
cameras:
  names:
    - "CAM_FRONT"
    - "CAM_FRONT_LEFT"
    - "CAM_FRONT_RIGHT"
    - "CAM_BACK"
    - "CAM_BACK_LEFT"
    - "CAM_BACK_RIGHT"
  primary: "CAM_FRONT"                      # used for single-cam mode

# ── VLM Semantic Reasoner ─────────────────────────────────────────────────────
vlm:
  enabled: true                             # set false on Mac (MPS unsupported for Qwen)
  model_id: "Qwen/Qwen2.5-VL-7B-Instruct"  # HuggingFace hub ID (fallback if local dir absent)
  model_dir: "~/prism_data/models/qwen2_5_vl_7b"  # local path — preferred on Jetson
  device: "cuda"                            # cuda on Jetson | cpu fallback on Mac
  max_new_tokens: 400
  divergence_threshold: 0.40               # T1 threshold — matches paper (θ_δ = 0.40)
  max_silence_s: 8.0                       # T5 keepalive — force VLM after 8s silence (T_max)
  cooldown_s: 0.4                          # min gap between VLM calls (T_cool) — max 2.5Hz invocation rate

# ── LSTM Intent Predictor ─────────────────────────────────────────────────────
lstm_intent_checkpoint: "~/prism_data/checkpoints/lstm_intent/model.pt"

# ── Adaptive Planner ─────────────────────────────────────────────────────────
planner:
  cruise_speed_mps:     4.17   # 15 km/h — campus/Indian urban roads
  max_accel_mps2:       2.0    # comfortable urban acceleration
  max_decel_mps2:       4.0    # firm braking (0.4 g)
  emergency_decel_mps2: 8.0   # panic brake (0.8 g)
  max_jerk_mps3:        2.0    # ISO 2631 passenger comfort limit
  plan_horizon_s:       3.0    # seconds of lookahead
  plan_dt_s:            0.1    # 10 Hz planning rate
  safety_margin_m:      3.0    # clearance ahead of nearest corridor obstacle

# ── ROS2 Bag Data ─────────────────────────────────────────────────────────────
ros2_bag:
  data_root: "prism/new data"               # relative to project root
  bags:
    test1:    "test1/test1.db3"             # ~237s  camera + LiDAR + IMU
    test2:    "test2/test12.db3"            # ~71s   camera + LiDAR + IMU
    ros2_bag: "ros2_bag/ros2_bag.db3"       # ~208s  LiDAR + IMU only (no camera)

  topics:
    camera:      "/usb_cam/image_raw"
    camera_info: "/usb_cam/camera_info"
    lidar:       "/velodyne_points"
    imu:         "/imu/data"

  sync_tolerance_s: 0.08                   # max camera-LiDAR time gap for sync

  # USB camera fallback intrinsics (used if camera_info not in bag)
  usb_cam_defaults:
    fx: 600.0
    fy: 600.0
    cx: 320.0
    cy: 240.0
    width: 640
    height: 480

# ── LiDAR Processor ───────────────────────────────────────────────────────────
lidar:
  # SOR outlier removal
  sor_k: 20
  sor_std_ratio: 1.0

  # Voxel downsampling
  voxel_size: 0.10                          # metres

  # Ground removal (matches lidarGroundRemove.cpp defaults)
  grid_res: 0.5
  height_margin: 0.25
  max_range: 40.0
  dilation_steps: 3
  min_pts_in_cell: 1

  # Range-adaptive DBSCAN (matches boundingBox.cpp defaults)
  eps_near: 0.20
  eps_range_factor: 0.05
  min_pts_near: 5
  min_pts_far: 2
  far_range: 20.0
  min_cluster_near: 30
  min_cluster_far: 5
  far_cluster_range: 20.0

  # Cluster filters
  max_box_dimension: 15.0                   # metres any axis
  min_box_volume: 0.01                      # m³
  max_ground_clearance: 0.5                 # m
  min_point_density: 5.0                    # pts/m³
  density_range_factor: 0.05
  merge_distance: 1.5                       # metres — merge nearby AABBs
  min_forward_dist: 0.5                     # only keep objects ahead
  max_forward_dist: 50.0
  max_lateral_dist: 20.0

# ── Logging ───────────────────────────────────────────────────────────────────
logging:
  level: "INFO"
  use_wandb: false                          # enable when ready for experiments
  wandb_project: "prism-autonomy"
  save_visualizations: true
  viz_output_dir: "~/prism_data/experiments/visualizations"
